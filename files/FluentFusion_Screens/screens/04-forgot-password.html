<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>1.4 Forgot Password — FluentFusion</title>
<link rel="stylesheet" href="../shared.css">
<style>
.center-wrap { min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow: hidden; }
.bg-glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(191,255,0,0.05) 0%, transparent 65%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
.auth-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 44px; position: relative; z-index: 2; }
.auth-card::before { content: ''; position: absolute; inset: 0; border-radius: inherit; border: 1px solid transparent; background: linear-gradient(145deg, rgba(191,255,0,0.15), transparent 50%) border-box; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; pointer-events: none; }
.icon-circle { width: 64px; height: 64px; background: var(--neon-dim); border: 1px solid rgba(191,255,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 24px; }
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="#"><div class="logo-mark">🧠</div><div class="logo-name">FLUENT<span>FUSION</span></div></a>
</nav>

<div class="center-wrap">
  <div class="bg-glow"></div>
  <div class="auth-card">
    <a href="#" style="font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;margin-bottom:28px;">← Back to Login</a>

    <div class="icon-circle">🔑</div>

    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:8px;">Forgot Password</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.6;">No worries! Enter your email and we'll send you reset instructions.</div>
    </div>

    <div class="form-group">
      <label class="label">Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input class="input" type="email" placeholder="jean@example.com">
      </div>
    </div>

    <button class="btn btn-primary btn-lg btn-full mt-16">Send Reset Link →</button>

    <p style="text-align:center;font-size:14px;color:var(--muted);margin-top:24px;">
      Remember your password? <a href="#" style="color:var(--neon);text-decoration:none;font-weight:600;">Sign In</a>
    </p>
  </div>
</div>
<div class="screen-id">1.4 · Forgot Password</div>
</body></html>
