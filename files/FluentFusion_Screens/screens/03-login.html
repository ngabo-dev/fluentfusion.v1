<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>1.3 Login — FluentFusion</title>
<link rel="stylesheet" href="../shared.css">
<style>
body { min-height: 100vh; }
.center-wrap { min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow: hidden; }
.bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(191,255,0,0.06) 0%, transparent 65%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
.auth-card { width: 100%; max-width: 440px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 44px; position: relative; z-index: 2; }
.auth-card::before { content: ''; position: absolute; inset: 0; border-radius: inherit; border: 1px solid transparent; background: linear-gradient(145deg, rgba(191,255,0,0.18), transparent 50%) border-box; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; pointer-events: none; }
.checkbox-row { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 20px; }
.checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
.checkbox-box { width: 16px; height: 16px; border: 1px solid var(--border2); border-radius: 4px; background: var(--input-bg); }
.social-btn { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 20px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--fg); transition: border-color 0.15s; margin-bottom: 10px; }
.social-btn:hover { border-color: var(--border2); }
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="#"><div class="logo-mark">🧠</div><div class="logo-name">FLUENT<span>FUSION</span></div></a>
  <div style="font-size:14px;color:var(--muted);">Don't have an account? <a href="#" style="color:var(--neon);text-decoration:none;font-weight:600;">Sign Up</a></div>
</nav>

<div class="center-wrap">
  <div class="bg-glow"></div>
  <div class="auth-card">
    <a href="#" style="font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;margin-bottom:28px;">← Back to Home</a>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px;">
      <div class="logo-mark" style="width:34px;height:34px;font-size:15px;">🧠</div>
      <div class="logo-name" style="font-size:15px;">FLUENT<span>FUSION</span></div>
    </div>

    <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:6px;">Welcome Back</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:28px;">Sign in to continue your learning journey</div>

    <div class="form-group">
      <label class="label">Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input class="input" type="email" placeholder="jean@example.com">
      </div>
    </div>

    <div class="form-group">
      <label class="label">Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">🔒</span>
        <input class="input" type="password" placeholder="••••••••">
      </div>
    </div>

    <div class="checkbox-row">
      <label class="checkbox-label">
        <div class="checkbox-box" style="background:var(--neon-dim);border-color:var(--neon);">✓</div>
        Remember me
      </label>
      <a href="#" style="font-size:13px;color:var(--neon);text-decoration:none;font-weight:600;">Forgot Password?</a>
    </div>

    <button class="btn btn-primary btn-lg btn-full">Sign In →</button>

    <div class="divider-label"><span>or</span></div>

    <div class="social-btn"><span>🇬</span> Continue with Google</div>
    <div class="social-btn"><span>🍎</span> Continue with Apple</div>

    <p style="text-align:center;font-size:14px;color:var(--muted);margin-top:20px;">
      Don't have an account? <a href="#" style="color:var(--neon);text-decoration:none;font-weight:600;">Sign Up Free</a>
    </p>
  </div>
</div>
<div class="screen-id">1.3 · Login</div>
</body></html>
