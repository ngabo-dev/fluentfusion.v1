<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>13.1 404 Not Found — FluentFusion</title>
<link rel="stylesheet" href="../shared.css">
<style>
.err-wrap{min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;position:relative;overflow:hidden;}
.err-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(191,255,0,.05),transparent 70%);}
.err-num{font-family:'Syne',sans-serif;font-size:160px;font-weight:800;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(191,255,0,.25);position:relative;z-index:1;letter-spacing:-.05em;}
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="#"><div class="logo-mark">🧠</div><div class="logo-name">FLUENT<span>FUSION</span></div></a>
  <div class="flex items-center gap-12"><button class="btn btn-ghost">← Go Back</button><button class="btn btn-primary">Home</button></div>
</nav>
<div class="err-wrap">
  <div class="err-bg"></div>
  <div style="position:relative;z-index:2;">
    <div class="err-num">404</div>
    <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:12px;margin-top:-20px;">Page Not Found</div>
    <div style="font-size:15px;color:var(--muted);max-width:400px;margin:0 auto 32px;line-height:1.7;">Looks like this lesson doesn't exist yet. Head back to your dashboard and keep learning!</div>
    <div class="flex gap-14 justify-content:center;flex-wrap:wrap;" style="justify-content:center;">
      <button class="btn btn-primary btn-lg">Go to Dashboard →</button>
      <button class="btn btn-outline btn-lg">Browse Courses</button>
    </div>
    <div style="margin-top:48px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);display:inline-block;">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">While you're here — today's word of the day:</div>
      <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--neon);">Impano</div>
      <div style="font-size:14px;color:var(--muted);margin-top:4px;">Kinyarwanda for "Gift"</div>
    </div>
  </div>
</div>
<div class="screen-id">13.1 · 404 Not Found</div>
</body></html>
