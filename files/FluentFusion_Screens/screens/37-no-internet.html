<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>13.2 No Internet — FluentFusion</title>
<link rel="stylesheet" href="../shared.css">
<style>
.err-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;}
.signal-icon{font-size:72px;margin-bottom:24px;filter:grayscale(1);opacity:.4;}
</style>
</head>
<body>
<div class="err-wrap">
  <div>
    <div class="signal-icon">📡</div>
    <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:12px;">No Internet Connection</div>
    <div style="font-size:15px;color:var(--muted);max-width:380px;margin:0 auto 32px;line-height:1.7;">You're offline. Check your connection and try again. Your progress has been saved locally.</div>
    <button class="btn btn-primary btn-lg" style="margin-right:12px;">↻ Try Again</button>
    <button class="btn btn-outline btn-lg">View Offline Content</button>
    <div style="margin-top:32px;padding:16px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);display:inline-flex;align-items:center;gap:12px;">
      <span style="font-size:20px;">💾</span>
      <div style="text-align:left;"><div style="font-size:13px;font-weight:600;">3 lessons saved offline</div><div style="font-size:12px;color:var(--muted);">Available without internet</div></div>
    </div>
  </div>
</div>
<div class="screen-id">13.2 · No Internet</div>
</body></html>
