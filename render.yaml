services:
  - type: web
    name: fluentfusion-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FRONTEND_URL
        value: https://fluentfusionv1.vercel.app
      - key: EMAIL_ENABLED
        value: "True"
      - key: RESEND_API_KEY
        value: re_UBSgYEG4_Pe8b8s9LwXrBuT9WVghyL7ox
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: FROM_NAME
        value: FluentFusion AI
      - key: SMTP_HOST
        value: ""
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""

staticSites:
  - name: fluentfusion-frontend
    rootDir: frontend/app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://fluentfusion-v1.onrender.com/api
      - key: VITE_FRONTEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
