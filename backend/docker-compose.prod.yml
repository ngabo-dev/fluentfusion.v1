version: "3.9"

services:
  # ── Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: fluentfusion_frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - fluentfusion

  # ── Unified FluentFusion + PULSE Backend
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: fluentfusion_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fluentfusion:secret@db:5432/fluentfusion}
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - DEBUG=false
      - PULSE_MODEL_PATH=/app/pulse_artifacts/pulse_model.pkl
      - PULSE_SCALER_PATH=/app/pulse_artifacts/pulse_scaler.pkl
      - PULSE_ENCODERS_PATH=/app/pulse_artifacts/label_encoders.pkl
      - PULSE_METADATA_PATH=/app/pulse_artifacts/pulse_metadata.json
    env_file:
      - ./.env
    volumes:
      - ./pulse_artifacts:/app/pulse_artifacts:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - fluentfusion
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: fluentfusion_db
    environment:
      POSTGRES_USER: fluentfusion
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: fluentfusion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fluentfusion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluentfusion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + Celery broker)
  redis:
    image: redis:7-alpine
    container_name: fluentfusion_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fluentfusion
    volumes:
      - redis_data:/data

  # ── Celery worker (handles PULSE batch predictions + async tasks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluentfusion_worker
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fluentfusion:secret@db:5432/fluentfusion}
      - REDIS_URL=redis://redis:6379
      - PULSE_MODEL_PATH=/app/pulse_artifacts/pulse_model.pkl
      - PULSE_SCALER_PATH=/app/pulse_artifacts/pulse_scaler.pkl
      - PULSE_ENCODERS_PATH=/app/pulse_artifacts/label_encoders.pkl
      - PULSE_METADATA_PATH=/app/pulse_artifacts/pulse_metadata.json
    env_file:
      - ./.env
    volumes:
      - ./pulse_artifacts:/app/pulse_artifacts:ro
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - fluentfusion

networks:
  fluentfusion:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
