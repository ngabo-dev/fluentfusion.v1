version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fluentfusion_db
    environment:
      POSTGRES_DB: fluentfusion
      POSTGRES_USER: fluentuser
      POSTGRES_PASSWORD: fluentpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fluent_network

  redis:
    image: redis:7-alpine
    container_name: fluentfusion_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fluent_network

  api:
    build: .
    container_name: fluentfusion_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fluentuser:fluentpass@postgres/fluentfusion
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app
    networks:
      - fluent_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: fluentfusion_celery
    environment:
      DATABASE_URL: postgresql://fluentuser:fluentpass@postgres/fluentfusion
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - postgres
    volumes:
      - ./app:/app
    networks:
      - fluent_network
    command: celery -A app.tasks worker --loglevel=info

networks:
  fluent_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: